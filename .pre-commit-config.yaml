repos:
  # ── Python formatting ──────────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3.11
        files: ^backend/

  # ── Import sorting ─────────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]
        files: ^backend/

  # ── Python linting ─────────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        files: ^backend/
        additional_dependencies:
          - flake8-bugbear # opinionated bug-prone pattern detection
          - flake8-comprehensions # C4xx: unnecessary comprehensions
          - flake8-docstrings # D1xx: missing docstrings (pydocstyle)

  # ── Static type checking ───────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        files: ^backend/
        stages: [manual]
        additional_dependencies:
          - pydantic>=2.0

  # ── TypeScript / ESLint ────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint
        name: ESLint (TypeScript)
        language: system
        entry: bash -c 'cd frontend && npm run lint'
        types_or: [ts, tsx]
        files: ^frontend/src/
        pass_filenames: false
        require_serial: false

  # ── Prettier (TS/TSX/JSON/CSS/MD) ─────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/
        types_or: [ts, tsx, json, css, markdown]
        additional_dependencies:
          - prettier@3.2.5
          - "@prettier/plugin-xml@3.4.1"

  # ── General hygiene (all files) ───────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # NOTE: trailing-whitespace, end-of-file-fixer and mixed-line-ending are
      # pinned to stages:[manual] because Windows Application Control / Smart
      # App Control intermittently blocks the unsigned .exe shims pre-commit
      # generates for them (WinError 4551) — same workaround as mypy above.
      # These three are redundant locally anyway (black + prettier already
      # normalise whitespace and line endings). Run them on demand with:
      #   pre-commit run --all-files --hook-stage manual
      # CI does not invoke pre-commit, so commit-time enforcement is unaffected.
      - id: trailing-whitespace
        exclude: \.md$ # allow trailing spaces in Markdown (line break)
        stages: [manual]
      - id: end-of-file-fixer
        stages: [manual]
      - id: mixed-line-ending
        args: ["--fix=lf"]
        stages: [manual]
      # Validators below keep real value at commit time and stay active.
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key # blocks accidental secret commits
