# alembic.ini
# =============================================================================
# AIRP — Alembic Configuration
#
# The sqlalchemy.url is intentionally left empty — it is resolved at runtime
# from backend.config.settings.active_database_url in env.py.
# This means the same alembic.ini works for dev, test, CI, and production
# without any manual edits.
#
# Run from ANY directory (%(here)s resolves relative to alembic.ini):
#   alembic -c backend/alembic.ini upgrade head
#   alembic -c backend/alembic.ini revision --autogenerate -m "description"
#   alembic -c backend/alembic.ini downgrade -1
# =============================================================================

[alembic]
# Path to migration scripts — relative to alembic.ini location (backend/)
script_location = %(here)s/migrations

# Migration file template — includes timestamp for deterministic ordering
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Prepend sys.path so "from backend.config import settings" resolves.
# %(here)s = directory containing alembic.ini (backend/).
# %(here)s/.. = repo root — the directory that contains the backend/ package.
prepend_sys_path = %(here)s/..

# Timezone for migration timestamps (UTC keeps it consistent across machines)
timezone = UTC

# Leave blank — URL is resolved in env.py from backend.config.settings
sqlalchemy.url =

# Alembic transaction per migration — safe default
transaction_per_migration = true


[post_write_hooks]
# No post-write hooks — black/isort run via pre-commit before the commit


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %%H:%%M:%%S