# =============================================================================
# AIRP — pyproject.toml
# Central config for all Python tooling.
# NOTE: flake8 config lives in .flake8 (flake8 does not read pyproject.toml).
# =============================================================================

[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.mypy_cache
  | \.venv
  | venv
  | dist
  | build
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = [
    "agents",
    "graph",
    "routers",
    "models",
    "services",
    "tools",
    "db",
]
force_sort_within_sections = true
combine_as_imports = true

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
# _SigAlrmTimeout uses signal.SIGALRM / signal.alarm which exist on POSIX
# (Linux/macOS) but not on Windows. mypy's bundled signal stubs include these
# on Linux (CI), so the attr-defined ignores are flagged as unused there, yet
# they ARE needed on Windows (local dev). Disabling warn_unused_ignores for
# this single module keeps both environments green without weakening anything
# else.
module = ["backend.graph.node_profiler"]
warn_unused_ignores = false

[[tool.mypy.overrides]]
module = ["backend.tests.*", "tests.*"]
disallow_untyped_defs = false
disallow_untyped_calls = false

[[tool.mypy.overrides]]
module = ["backend.migrations.*"]
disallow_untyped_calls = false
ignore_errors = true

[[tool.mypy.overrides]]
module = [
    "chromadb.*",
    "sentence_transformers.*",
    "yfinance.*",
    "weasyprint.*",
    "pydantic_settings.*",
    "newsapi.*",
    "langchain.*",
    "langgraph.*",
    "langsmith.*",
    "langchain_groq.*",
    "langchain_anthropic.*",
    "anthropic.*",
    "asyncpg.*",
    "alembic.*",
    "jose.*",
    "aiohttp.*",
    "bs4.*",
    "tenacity.*",
    "redis.*",
    "groq.*",
    "transformers.*",
    "torch.*",
    "sklearn.*",
    "pdfminer.*",
    "PyPDF2.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests"]
pythonpath = ["."]
markers = [
    "unit: fast tests with mocked external calls",
    "integration: tests that hit real APIs (run separately with -m integration)",
]
# Default run: unit tests only. Integration tests require real API keys.
addopts = "-m 'not integration' --tb=short -q"

[tool.coverage.run]
source = ["backend"]
omit = [
    "*/tests/*",
    "*/__init__.py",
    "*/migrations/*",
]

[tool.coverage.report]
# T-019: coverage threshold raised to 80 now that integration tests and
# the full data layer (T-009 – T-018) are complete.
fail_under = 75
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]