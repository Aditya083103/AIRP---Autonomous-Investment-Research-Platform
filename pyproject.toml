# ─────────────────────────────────────────────────────────────────────────────
# AIRP — pyproject.toml
# Central config for all Python tooling.
# NOTE: flake8 config lives in .flake8 (flake8 does not read pyproject.toml).
# ─────────────────────────────────────────────────────────────────────────────

[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
# Exclude generated or vendored code
exclude = '''
/(
    \.git
  | \.mypy_cache
  | \.venv
  | venv
  | dist
  | build
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = [
    "agents",
    "graph",
    "routers",
    "models",
    "services",
    "tools",
    "db",
]
# Keep compatibility with black's trailing comma style
force_sort_within_sections = true
combine_as_imports = true

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
plugins = ["pydantic.mypy"]

# Per-module overrides — relax strict checks on test files
[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false
disallow_untyped_calls = false

# Third-party stubs that don't ship types yet
[[tool.mypy.overrides]]
module = [
    "chromadb.*",
    "sentence_transformers.*",
    "yfinance.*",
    "weasyprint.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests"]
markers = [
    "unit: fast tests with mocked external calls",
    "integration: tests that hit real APIs (run separately)",
]
# Run only unit tests by default; use -m integration for the real ones
addopts = "-m 'not integration' --tb=short"

[tool.coverage.run]
source = ["backend"]
omit = ["*/tests/*", "*/__init__.py"]

[tool.coverage.report]
fail_under = 85
show_missing = true
