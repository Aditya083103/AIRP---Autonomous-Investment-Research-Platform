version: "3.9"

# ─────────────────────────────────────────────
# AIRP — Local development stack
# Usage: docker-compose up
# ─────────────────────────────────────────────

services:

  # ── FastAPI backend ───────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # hot-reload on code changes
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://airp:airp@postgres:5432/airp
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── PostgreSQL ────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airp
      POSTGRES_PASSWORD: airp
      POSTGRES_DB: airp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airp"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── ChromaDB ─────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"

  # ── React frontend ────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules         # anonymous volume prevents host override
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  chroma_data:
