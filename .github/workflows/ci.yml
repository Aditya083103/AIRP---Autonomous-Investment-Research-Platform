name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: airp
          POSTGRES_PASSWORD: airp
          POSTGRES_DB: airp_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint — black (format check)
        working-directory: backend
        run: black --check .

      - name: Lint — flake8
        working-directory: backend
        run: flake8 .

      - name: Type check — mypy
        working-directory: backend
        run: mypy .

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://airp:airp@localhost/airp_test
          ENVIRONMENT: test
        run: pytest -v --cov=. --cov-report=term-missing --cov-fail-under=85

  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check — tsc
        working-directory: frontend
        run: npm run type-check

      - name: Lint — eslint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
